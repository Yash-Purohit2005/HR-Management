spring.application.name=PulseHR
spring.profiles.active=local

# === DATABASE (Local) ===
spring.datasource.url=jdbc:mysql://localhost:3306/hr_portal
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:your_local_root_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.hikari.maximum-pool-size=3
spring.jpa.open-in-view=false

# === SERVER ===
server.port=8080
server.address=0.0.0.0

# === WEBSOCKET ===
spring.websocket.max-text-message-size=8192

# === MAIL BASE CONFIG ===
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# These fallback to Gmail defaults if not specified locally
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# === APP CONFIG ===
jwt.secret=${JWT_SECRET:a_temporary_local_secret_at_least_256_bits_long}
app.frontend.url=${APP_CONFIG:http://localhost:5173}