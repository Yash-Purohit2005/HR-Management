 spring.application.name=PulseHR
spring.profiles.active=local
jwt.secret= ${JWT_SECRET}
# === DATABASE ===
spring.datasource.url=jdbc:mysql://localhost:3306/hr_portal
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# === Server Port (optional) ===
server.port=8080
server.address=0.0.0.0
# === WebSocket ===
# ? ADDED: Allows Spring to manage WebSocket sessions per user (needed for convertAndSendToUser)
spring.websocket.max-text-message-size=8192
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Your real Gmail address
spring.mail.username=${MAIL_USERNAME}
# Your specific IP address
app.frontend.url=${APP_CONFIG}
# The 16-character App Password (No spaces)
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Recommended: Timeout settings so the app doesn't hang if the connection is slow
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000